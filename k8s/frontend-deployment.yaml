# ============================================================
# Frontend Deployment
# ============================================================
# Deploys the React (Vite) frontend application.
#
# Features:
# - 2 replicas for high availability
# - Rolling updates
# - Resource requests & limits
# - Liveness, Readiness and Startup probes
# ============================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: request-system

  labels:
    app: frontend
    component: web

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        app: frontend
        component: web

    spec:

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: frontend

      containers:
        - name: frontend

          image: shakthivelk24/requestsystem-frontend:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"

            limits:
              cpu: "200m"
              memory: "128Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: 80
            failureThreshold: 30
            periodSeconds: 5

      restartPolicy: Always