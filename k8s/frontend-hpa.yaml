# ============================================================
# Horizontal Pod Autoscaler (HPA) - Frontend
# ============================================================
# Automatically scales the frontend Deployment based on CPU usage.
#
# Requirements:
# - Metrics Server must be installed in the Kubernetes cluster.
# - Frontend Deployment must define CPU requests.
#
# Scaling Policy:
#   Minimum Replicas : 2
#   Maximum Replicas : 10
#   Target CPU Usage : 70%
# ============================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: frontend-hpa
  namespace: request-system

  labels:
    app: frontend
    component: autoscaler

spec:
  # Deployment to scale
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend

  # Minimum number of Pods
  minReplicas: 2

  # Maximum number of Pods
  maxReplicas: 10

  # Scale based on CPU utilization
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

  # Scaling behavior
  behavior:

    # Scale Up
    scaleUp:
      stabilizationWindowSeconds: 0

      policies:
        - type: Percent
          value: 100
          periodSeconds: 15

      selectPolicy: Max

    # Scale Down
    scaleDown:
      stabilizationWindowSeconds: 300

      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

      selectPolicy: Max